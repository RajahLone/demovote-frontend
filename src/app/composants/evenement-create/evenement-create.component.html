<app-menu></app-menu>
<div id="main">
<form  #formRef="ngForm" (ngSubmit)="addEvenement()" class="needs-validation">
	<div class="card shadow center">
  <div class="card-header"><span i18n>Fiche d'un événement</span></div>
		<div class="card-header shadow-sm">
			<button (click)="goToListEvenement()" class="btn bg-gradient btn-primary btn-sm"><fa-icon [icon]="faXmark"></fa-icon>&nbsp;<span i18n>Retour</span></button>
		</div>
		<div class="card-body">

      <div class="form-group row">
        <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Journée</span></label>
    		<div class="col-sm-8">
    			<div class="form-group field-separate">
            <select class="form-select form-select-sm" id="jourDebut" name="jourDebut" [(ngModel)]="evenement.jourDebut">
              @if (this.journees.jour1Court) { <option [value]="this.journees.jour1Event">{{ this.journees.jour1Event }}</option> }
              @if (this.journees.jour2Court) { <option [value]="this.journees.jour2Event">{{ this.journees.jour2Event }}</option> }
              @if (this.journees.jour3Court) { <option [value]="this.journees.jour3Event">{{ this.journees.jour3Event }}</option> }
    				</select>
    			</div>
    		</div>
    	</div>

    	<div class="form-group row">
        <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Heure du début</span></label>
    		<div class="col-sm-2">
          <input type="time" class="form-control form-control-sm field-separate" id="heureDebut" name="heureDebut" [(ngModel)]="evenement.heureDebut">
    		</div>
    	</div>

    	<div class="form-group row">
        <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Durée (en minutes)</span></label>
    		<div class="col-sm-2">
          <input type="number" min="0" class="form-control form-control-sm field-separate" id="duree" name="duree" [(ngModel)]="evenement.duree">
    		</div>
    	</div>

    	<div class="form-group row">
    		<label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Type</span></label>
    		<div class="col-sm-8">
    			<div class="form-group field-separate">
            <select class="form-select form-select-sm" id="type" name="type" [(ngModel)]="evenement.type"> @for (type of types; track type.key) {
    					<option [value]="type.key">{{ type.value }}</option> }
    				</select>
    			</div>
    		</div>
    	</div>

			<div class="form-group row">
        <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Intitulé</span>&nbsp;<sup><span class="text-danger">*</span></sup></label>
				<div class="col-sm-8">
          <input type="text" class="form-control form-control-sm field-separate" id="intitule" name="intitule" [(ngModel)]="evenement.intitule" #IntituleRef="ngModel" required [class.is-invalid]="IntituleRef.invalid && IntituleRef.touched">
				</div>
			</div>

      <div class="form-group row">
        <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Descriptif</span></label>
  			<div class="col-sm-8">
          <textarea class="form-control form-control-sm field-separate" id="descriptif" name="descriptif" [(ngModel)]="evenement.descriptif"></textarea>
  			</div>
  		</div>

      <div class="form-group row">
        <label class="col-sm-3 col-form-label col-form-label-sm label-nobr"><span i18n>Lien</span></label>
        <label class="col-sm-1 col-form-label col-form-label-sm label-nobr">https://</label>
        <div class="col-sm-8 ">
          <input type="text" class="form-control form-control-sm field-separate" id="lien" [(ngModel)]="evenement.lien" name="lien">
        </div>
  		</div>

		</div>
		<div class="card-footer">
			<button type="button" class="btn bg-gradient btn-success btn-sm text-left" type="submit" [disabled]="formRef.invalid"><fa-icon [icon]="faPlus"></fa-icon>&nbsp;<span i18n>Créer</span></button>
		</div>
	</div>
</form>
</div>
