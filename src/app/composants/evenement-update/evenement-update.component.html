<app-menu></app-menu>
<div id="main">
<form id="formVariable" #formRef="ngForm" class="needs-validation">
<div class="card shadow center">
  <div class="card-header"><span i18n>Fiche d'un événement</span></div>
	<div class="card-header shadow-sm">
    <button (click)="goToListEvenement()" class="btn bg-gradient btn-primary btn-sm"><fa-icon [icon]="faXmark"></fa-icon>&nbsp;<span i18n>Retour</span></button>
	</div>
	<div class="card-body">

    <div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Journée</span></label>
			<div class="col-sm-8">
				<div class="form-group field-separate">
          <select class="form-select form-select-sm" id="jourDebut" name="jourDebut" [(ngModel)]="evenement.jourDebut">
            @if (this.journees.jour1Court) { <option [value]="this.journees.jour1Event">{{ this.journees.jour1Event }}</option> }
            @if (this.journees.jour2Court) { <option [value]="this.journees.jour2Event">{{ this.journees.jour2Event }}</option> }
            @if (this.journees.jour3Court) { <option [value]="this.journees.jour3Event">{{ this.journees.jour3Event }}</option> }
					</select>
				</div>
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Heure du début</span></label>
			<div class="col-sm-2">
        <input type="time" class="form-control form-control-sm field-separate" id="heureDebut" name="heureDebut" [(ngModel)]="evenement.heureDebut">
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Durée (en minutes)</span></label>
			<div class="col-sm-2">
        <input type="number" min="0" class="form-control form-control-sm field-separate" id="duree" name="duree" [(ngModel)]="evenement.duree">
			</div>
		</div>

		<div class="form-group row">
			<label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Type</span></label>
			<div class="col-sm-8">
				<div class="form-group field-separate">
          <select class="form-select form-select-sm" id="type" name="type" [(ngModel)]="evenement.type"> @for (type of types; track type.key) {
						<option [value]="type.key">{{ type.value }}</option> }
					</select>
				</div>
			</div>
		</div>

  	<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Intitulé</span>&nbsp;<sup><span class="text-danger">*</span></sup></label>
			<div class="col-sm-8">
        <input type="text" class="form-control form-control-sm field-separate" id="intitule" [(ngModel)]="evenement.intitule" name="intitule" #libelleRef="ngModel" required [class.is-invalid]="libelleRef.invalid && libelleRef.touched">
			</div>
		</div>

    <div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Descriptif</span></label>
			<div class="col-sm-8">
        <textarea class="form-control form-control-sm field-separate" id="descriptif" name="descriptif" [(ngModel)]="evenement.descriptif"></textarea>
			</div>
		</div>

    <div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Lien</span></label>
			<div class="col-sm-8">
        <input type="text" class="form-control form-control-sm field-separate" id="lien" [(ngModel)]="evenement.lien" name="lien" #libelleRef="ngModel" required [class.is-invalid]="libelleRef.invalid && libelleRef.touched">
			</div>
		</div>

	</div>
	<div class="card-footer">
			<button type="button" class="btn bg-gradient btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalModifier" [disabled]="formRef.invalid"><fa-icon [icon]="faCheck"></fa-icon>&nbsp;<span i18n>Modifier</span></button>
			<button type="button" class="btn bg-gradient btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalEffacer" style="float: right;"><fa-icon [icon]="faTrash"></fa-icon>&nbsp;<span i18n>Effacer</span></button>
	</div>
</div>
</form>

<div class="modal fade" id="modalModifier" tabindex="-1" aria-labelledby="modalModifierTitre" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered" role="document">
		<div class="modal-content">
			<div class="modal-header">
        <h5 class="modal-title" id="modalModifierTitre"><span i18n>Modification d'un événement</span></h5>
			</div>
			<div class="modal-body"><span i18n>Actualiser cet enregistrement ?</span></div>
			<div class="modal-footer">
				<button type="button" class="btn bg-gradient btn-secondary btn-sm" data-bs-dismiss="modal"><span i18n>Annuler</span></button>
				<button type="button" class="btn bg-gradient btn-warning btn-sm" (click)="updateConfirmed()" data-bs-dismiss="modal"><span i18n>Confirmer</span></button>
			</div>
		</div>
	</div>
</div>

<div class="modal fade" id="modalEffacer" tabindex="-1" aria-labelledby="modalEffacerTitre" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered" role="document">
		<div class="modal-content">
			<div class="modal-header">
        <h5 class="modal-title text-danger" id="modalEffacerTitre"><span i18n>Suppression d'un événement</span></h5>
			</div>
			<div class="modal-body"><span i18n>Effacer cet enregistrement ?</span></div>
			<div class="modal-footer">
				<button type="button" class="btn bg-gradient btn-secondary btn-sm" data-bs-dismiss="modal"><span i18n>Annuler</span></button>
				<button type="button" class="btn bg-gradient btn-danger btn-sm" (click)="deleteConfirmed()" data-bs-dismiss="modal"><span i18n>Confirmer</span></button>
			</div>
		</div>
	</div>
</div>
</div>
